<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Solaris Calculator</title>

    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <main class="page">
        <section class="app-shell">
            <div class="intro-panel">
                <p class="eyebrow">Solar-punk interface</p>

                <h1>Solaris Calculator</h1>

                <p class="intro-text">
                    A luminous vanilla JavaScript calculator designed for clarity,
                    keyboard flow, and beginner-friendly logic.
                </p>

                <div class="shortcut-card">
                    <p>Keyboard ready</p>
                    <span>0–9 · + − × ÷ · Enter · Backspace · Escape</span>
                </div>
            </div>

            <section class="calculator" aria-label="Solaris Calculator">
                <div class="calculator-display">
                    <p class="expression" id="expression">12 + 7 −</p>
                    <p class="display-value" id="display">19</p>
                </div>

                <div class="calculator-keys">
                    <button class="key key-action key-clear" data-action="clear">AC</button>
                    <button class="key key-action" data-action="backspace" aria-label="Backspace">⌫</button>
                    <button class="key key-action" data-action="decimal">.</button>
                    <button class="key key-operator" data-operator="divide">÷</button>

                    <button class="key" data-number="7">7</button>
                    <button class="key" data-number="8">8</button>
                    <button class="key" data-number="9">9</button>
                    <button class="key key-operator" data-operator="multiply">×</button>

                    <button class="key" data-number="4">4</button>
                    <button class="key" data-number="5">5</button>
                    <button class="key" data-number="6">6</button>
                    <button class="key key-operator" data-operator="subtract">−</button>

                    <button class="key" data-number="1">1</button>
                    <button class="key" data-number="2">2</button>
                    <button class="key" data-number="3">3</button>
                    <button class="key key-operator" data-operator="add">+</button>

                    <button class="key key-zero" data-number="0">0</button>
                    <button class="key key-equals" data-action="equals">=</button>
                </div>
            </section>
        </section>

        <footer class="footer">
            <p>Built with HTML, CSS and vanilla JavaScript.</p>
        </footer>
    </main>
</body>

</html>
